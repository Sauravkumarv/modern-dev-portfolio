<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Modern developer portfolio for a full stack developer and AI/ML engineer."
    />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Developer Portfolio</title>
    <script>
      window.__loadPagesFallback = () => {
        const repoBase = "/modern-dev-portfolio/";
        const isGitHubPagesHost = window.location.hostname.endsWith("github.io");

        if (!isGitHubPagesHost) {
          return;
        }

        if (!window.location.pathname.startsWith(repoBase)) {
          window.location.replace(`${window.location.origin}${repoBase}`);
          return;
        }

        if (!document.querySelector('link[data-pages-fallback="true"]')) {
          const stylesheet = document.createElement("link");
          stylesheet.rel = "stylesheet";
          stylesheet.href = `${repoBase}assets/app.css`;
          stylesheet.dataset.pagesFallback = "true";
          document.head.appendChild(stylesheet);
        }

        if (!document.querySelector('script[data-pages-fallback="true"]')) {
          const script = document.createElement("script");
          script.type = "module";
          script.src = `${repoBase}assets/app.js`;
          script.dataset.pagesFallback = "true";
          document.body.appendChild(script);
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx" onerror="window.__loadPagesFallback()"></script>
  </body>
  </html>
